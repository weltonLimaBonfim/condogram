# ══════════════════════════════════════════════════════════════════════════════
# PRD — Swagger DESABILITADO, pool otimizado, segurança máxima
# ══════════════════════════════════════════════════════════════════════════════
server:
  port: 8080
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024
  tomcat:
    connection-timeout: 20000
    max-threads: 200
    min-spare-threads: 20

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME:condowhats}?useSSL=true&requireSSL=true&verifyServerCertificate=false&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000
      pool-name: CondoWhats-PRD-Pool
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  devtools:
    restart:
      enabled: false

  task:
    execution:
      pool:
        core-size: 8
        max-size: 32
        queue-capacity: 1000
      shutdown:
        await-termination: true
        await-termination-period: 60s

condowhats:
  telegram:
    mode: WEBHOOK

logging:
  level:
    com.condowhats: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
  file:
    name: /var/log/condowhats/condowhats.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB

management:
  endpoints:
    web:
      exposure:
        include: health, info
      base-path: /internal
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
